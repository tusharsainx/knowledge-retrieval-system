version: "3.9"

services:
  # 1. PostgreSQL 16 — Metadata & Ingestion State Store
  postgres:
    image: postgres:16-alpine
    container_name: doc_processor_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: doc_processor
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - ./pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d doc_processor"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis 7 — Broker for arq Asynchronous Tasks
  redis:
    image: redis:7-alpine
    container_name: doc_processor_redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data
    command: redis-server --appendonly yes # Persists task states to disk

  # 3. MinIO — S3-Compatible Local Object Storage
  minio:
    image: minio/minio
    container_name: doc_processor_minio
    ports:
      - "9000:9000"  # S3 API Endpoint
      - "9001:9001"  # Web Console Management UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data
